syntax = "proto3";

package contact;

option go_package = "/contact";

message ContactRequest {
    string senderId = 1;
    string receiverId = 2;
    string subject = 3;
    string message = 4;
}

message ContactResponse {
    string error = 1;
    string message = 2;
}

service ContactService {
    rpc SendContactRequest(ContactRequest) returns (ContactResponse);
}