services:

  broker-service:
    build:
      context: ./broker-service
      dockerfile: /broker-service.dockerfile
    restart: always
    ports:
      - "8080:80"
    deploy:
      mode: replicated
      replicas: 1

  authentication-service:
    build:
      context: ./authentication-service
      dockerfile: /authentication-service.dockerfile
    restart: always
    ports:
      - "8081:80"
    deploy:
      mode: replicated
      replicas: 1

  contact-service:
    build:
      context: ./contact-service
      dockerfile: /contact-service.dockerfile
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    environment:
      MAIL_DOMAIN: localhost
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: none
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      FROM_NAME: "John Smith"
      FROM_ADDRESS: email@example.com

  search-service:
    build:
      context: ./search-service
      dockerfile: /search-service.dockerfile
    restart: always
    ports:
      - "50051:50051"
    deploy:
      mode: replicated
      replicas: 1

  user-service:
    build:
      context: ./user_service
      dockerfile: /user_service.dockerfile
    restart: always
    ports:
      - "50052:50052"
    deploy:
      mode: replicated
      replicas: 1

  skills-service:
    build:
      context: ./skills-service
      dockerfile: /skills-service.dockerfile
    restart: always
    ports:
      - "50053:50053"
    deploy:
      mode: replicated
      replicas: 1

  mailhog:
    image: 'mailhog/mailhog:latest'
    ports:
      - "1025:1025"
      - "8025:8025"