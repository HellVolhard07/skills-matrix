version: '3.8'

services:

  broker-service:
    build:
      context: ./broker-service
      dockerfile: broker-service.dockerfile
    restart: always
    ports:
      - "8080:80"
    deploy:
      mode: replicated
      replicas: 1
    networks:
      - skillmetrix_network

  authentication-service:
    build:
      context: ./authentication-service
      dockerfile: authentication-service.dockerfile
    restart: always
    ports:
      - "8081:80"
    deploy:
      mode: replicated
      replicas: 1
    networks:
      - skillmetrix_network

  contact-service:
    build:
      context: ./contact-service
      dockerfile: contact-service.dockerfile
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    environment:
      MAIL_DOMAIN: localhost
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: none
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      FROM_NAME: "John Smith"
      FROM_ADDRESS: email@example.com
    networks:
      - skillmetrix_network

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - skillmetrix_network

  user_service:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: skillmetrix_user_service
    ports:
      - "50052:50052"
    volumes:
      - ./user_service:/app/user_service
    environment:
      PYTHONUNBUFFERED: 1
    networks:
      - skillmetrix_network

  # Example future gateway service
  # gateway:
  #   build:
  #     context: ./gateway
  #     dockerfile: Dockerfile
  #   container_name: skillmetrix_gateway
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - ./gateway:/app
  #   depends_on:
  #     - user_service
  #   networks:
  #     - skillmetrix_network

networks:
  skillmetrix_network:
    driver: bridge